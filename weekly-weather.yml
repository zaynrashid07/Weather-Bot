name: Daily Weather Channel Post

# NOTE: this file must live at .github/workflows/weekly-weather.yml in your
# repo for GitHub Actions to pick it up - move it there after adding to git.
# (Filename/job name still say "weekly" for historical reasons - only the
# schedule below actually changed to run every day.)

on:
  schedule:
    # 6:30 AM in the America/Toronto timezone, every day. GitHub Actions
    # handles the EDT/EST switch automatically with an explicit timezone
    # set - no manual UTC math or twice-a-year cron edits needed.
    - cron: "30 6 * * *"
      timezone: "America/Toronto"
  workflow_dispatch: {} # lets you trigger a manual test run from the Actions tab

jobs:
  send-weather:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install -r requirements.txt

      - run: python weekly_weather_slack.py
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL_ID: ${{ vars.SLACK_CHANNEL_ID }}
